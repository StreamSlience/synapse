name: Release

# 手动触发（"Run workflow"）。触发后依次执行：
#   1. 从 package.json 读取版本号，
#   2. 将 CHANGELOG.md 中 `## [Unreleased]` 的内容提升为 `## [<version>]`
#      （并将该变更提交并推送回 main），确保发布说明不会因为维护者
#      未手动预建 [<version>] 块而出现内容稀疏的问题，
#   3. 为每个平台构建独立的打包产物（单一 runner——无需本地编译，跨平台打包可行），
#   4. 创建 GitHub Release（tag v<version>），附带所有归档文件，
#      发布说明来自 CHANGELOG.md，
#   5. 发布 npm 精简安装器（shim 包 + 各平台包）。
#
# 触发前须知：先升级 package.json 版本号。CHANGELOG.md 条目可以写在
# `## [Unreleased]` 下——步骤 2 会自动将其移动。同时需要设置 NPM_TOKEN secret。
on:
  workflow_dispatch: {}

permissions:
  contents: write   # 创建 GitHub Release + tag，推送 CHANGELOG 提升提交

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # 默认检出会游离在某个 SHA；我们需要一个真实的分支，
          # 这样 CHANGELOG 提升提交才知道推送到哪里。
          ref: ${{ github.ref }}
          # 以维护者（admin）身份鉴权，而非 github-actions[bot]。
          # "Require PR approval for main branch" 规则集只允许
          # Admin 角色绕过——GitHub 不允许在用户自有（非 org）仓库中
          # 将 GitHub Actions integration 添加到 bypass_actors，
          # 提示"Actor GitHub Actions integration must be part of
          # the ruleset source or owner organization."因此，下面的
          # 自动提升和自动同步 `git push origin HEAD:main` 步骤在
          # 默认 GITHUB_TOKEN 下都会失败。使用管理员拥有的细粒度 PAT
          # 可以让推送顺利完成。请设置 RELEASE_PAT secret，
          # 权限为：该仓库的 contents:write，无其他范围。
          # 按照你的 token 策略定期轮换；该 workflow 仅在手动触发时运行，
          # 因此影响范围较小。
          token: ${{ secrets.RELEASE_PAT }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: 同步 package-lock.json（若版本号有漂移）
        # 当维护者仅升级 package.json 版本号时（例如通过 GitHub Web UI 编辑），
        # `npm ci` 会因为 `package.json` 与 `package-lock.json` 不同步而拒绝运行，
        # 报错：`EUSAGE: npm ci can only install packages when your
        # package.json and package-lock.json … are in sync`。
        # 此步骤仅重写 lock 文件中的版本字段（顶层 + `packages.""` 条目）
        # 以与 package.json 保持一致，然后自动提交并推送结果，
        # 使 `main` 上的磁盘状态保持一致。
        # 幂等：若 lock 文件已匹配，则不产生提交。
        run: |
          set -euo pipefail
          PKG_V=$(node -p "require('./package.json').version")
          LOCK_V=$(node -p "require('./package-lock.json').version")
          if [ "$PKG_V" = "$LOCK_V" ]; then
            echo "package-lock.json already at $PKG_V — nothing to sync."
            exit 0
          fi
          echo "Lock-file version drift: lock=$LOCK_V, package=$PKG_V. Syncing."
          # `--package-lock-only` 仅重写 lock 文件，不触碰 node_modules，也不实际安装任何内容。开销极小。
          npm install --package-lock-only --ignore-scripts
          # 验证：lock 文件现在应该报告与 package.json 一致的版本号。
          NEW_LOCK_V=$(node -p "require('./package-lock.json').version")
          if [ "$NEW_LOCK_V" != "$PKG_V" ]; then
            echo "::error::lock-file still at $NEW_LOCK_V after sync attempt; expected $PKG_V"; exit 1
          fi
          if git diff --quiet -- package-lock.json; then
            echo "lock file unchanged after sync? bailing"; exit 1
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "release: sync package-lock.json to ${PKG_V}" -m "[skip ci] Auto-generated by Release workflow."
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"

      - run: npm ci
      - name: 确保 zip/unzip 可用
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zip unzip

      - name: 解析版本号
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: 将 [Unreleased] 提升为 CHANGELOG.md 中的 [<version>]
        # 幂等：若 [Unreleased] 为空或上一次运行已完成迁移，则为空操作。
        # 自动提交并将变更推送回 main，使 main 上的版本块成为后续的真实来源
        # （这样即便本次运行被重新触发，后续的 extract-release-notes.mjs 调用
        # 也能获取完整内容）。
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          before=$(git rev-parse HEAD)
          node scripts/prepare-release.mjs "$V"
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md unchanged — nothing to commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "docs(changelog): promote [Unreleased] into [${V}]" -m "[skip ci] Auto-generated by Release workflow."
            # 推送到触发此 workflow 的分支（main）。
            git push origin "HEAD:${GITHUB_REF#refs/heads/}"
          fi

      - name: 构建所有平台的打包产物
        run: |
          for t in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64 win32-arm64; do
            bash scripts/build-bundle.sh "$t"
          done
          ls -lh release

      - name: 生成 SHA256SUMS
        # 作为 release 资产发布；npm 启动器会对下载的打包产物
        # 进行校验（仅匹配文件基名，因此路径的 basename 匹配可正常工作）。
        run: |
          ( cd release && sha256sum synapse-* > SHA256SUMS )
          cat release/SHA256SUMS

      - name: 从 CHANGELOG.md 提取发布说明
        # 上面的"提升"步骤已保证 [<version>] 块有内容，
        # 因此实际上不需要 [Unreleased] 兜底。保留仅作纵深防御。
        run: |
          V="${{ steps.ver.outputs.version }}"
          node scripts/extract-release-notes.mjs "$V" > notes.md 2>/dev/null \
            || node scripts/extract-release-notes.mjs Unreleased > notes.md 2>/dev/null || true
          if [ ! -s notes.md ]; then
            echo "::error::No release notes in CHANGELOG.md for [$V] or [Unreleased]."
            exit 1
          fi
          echo "----- release notes -----"; cat notes.md

      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          # 幂等：只创建一次 release，若重新运行则刷新资产。
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release/synapse-* release/SHA256SUMS --clobber
          else
            gh release create "$TAG" release/synapse-* release/SHA256SUMS --title "$TAG" --notes-file notes.md
          fi

      - name: 发布到 npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          bash scripts/pack-npm.sh "$V"
          # 先发布各平台包，再发布主 shim（后者依赖前者）。
          # 跳过已在 registry 上存在的版本，这样重新运行只补发缺失的包。
          for dir in release/npm/synapse-* release/npm/main; do
            name=$(node -p "require('./$dir/package.json').name")
            if npm view "$name@$V" version >/dev/null 2>&1; then
              echo "skip $name@$V (already published)"
            else
              echo "publishing $name@$V"
              ( cd "$dir" && npm publish --access public )
            fi
          done

      - name: 验证每个包是否确实已在 registry 上
        run: |
          V="${{ steps.ver.outputs.version }}"
          # npm publish 可能打印成功但实际未持久化；通过查询 registry
          # 确认（含重试，等待传播），绿色代表真正发布成功。
          for dir in release/npm/synapse-* release/npm/main; do
            name=$(node -p "require('./$dir/package.json').name")
            ok=
            for i in 1 2 3 4 5 6; do
              if npm view "$name@$V" version >/dev/null 2>&1; then ok=1; break; fi
              echo "waiting for $name@$V to appear ($i)…"; sleep 10
            done
            [ -n "$ok" ] || { echo "::error::$name@$V never appeared on the registry"; exit 1; }
            echo "verified $name@$V"
          done

      - name: 同步包到 npmmirror
        # npmmirror/cnpm 镜像是懒加载的，且经常不会自动拉取各平台的
        # optionalDependencies，导致在那里执行 `npm i` 时报错
        # "no prebuilt bundle"（issue #303）。现在主动触发同步，
        # 让镜像用户无需等待 TTL 即可获取到打包产物。
        # 尽力而为——启动器本身也可以从 GitHub Releases 自愈——
        # 因此镜像同步失败不会阻断发布流程。
        continue-on-error: true
        run: |
          for dir in release/npm/synapse-* release/npm/main; do
            name=$(node -p "require('./$dir/package.json').name")
            enc=$(node -p "encodeURIComponent(require('./$dir/package.json').name)")
            echo "sync $name"
            curl -s -X PUT "https://registry.npmmirror.com/-/package/$enc/syncs" || true
            echo
          done
